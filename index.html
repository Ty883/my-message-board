<script>
   <script>
(function() {
    // 1. Configuration
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';

    // 2. Initialize Client
    // We check if it exists first to prevent "already declared" errors
    if (!window.supabaseClient) {
        window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    // 3. Define Functions on the 'window' object 
    // This ensures the HTML button can ALWAYS find them
    window.getMessages = async function() {
        const { data, error } = await window.supabaseClient
            .from('messages')
            .select('*')
            .order('created_at', { ascending: true });

        if (error) {
            console.error("Fetch error:", error.message);
        } else {
            const container = document.getElementById('messages');
            container.innerHTML = data.map(m => `
                <div style="margin-bottom: 8px;">
                    <strong>${m.username}:</strong> ${m.content}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
    };

    window.sendMessage = async function() {
        const userField = document.getElementById('username');
        const contentField = document.getElementById('content');

        if (!userField.value || !contentField.value) return alert("Fill in both fields!");

        const { error } = await window.supabaseClient
            .from('messages')
            .insert([{ username: userField.value, content: contentField.value }]);

        if (error) {
            alert("Database Error: " + error.message);
        } else {
            contentField.value = '';
            window.getMessages(); 
        }
    };

    // 4. Start the board
    window.getMessages();
    setInterval(window.getMessages, 3000);
})();
</script>
</script>
