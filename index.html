<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Board Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8943/8943377.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #ffffff; --text: #1a1a1b; --border: #e0e0e0; --msg-bg: rgba(255, 255, 255, 0.75); --accent: #6e8efb; --time: rgba(0, 0, 0, 0.4); }
        body.dark-mode { --bg: #18191a; --text: #ffffff; --border: #2c2d2e; --msg-bg: rgba(45, 45, 48, 0.9); --time: rgba(255, 255, 255, 0.5); }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradientBG 15s ease infinite; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .header-area { padding: calc(env(safe-area-inset-top) + 10px) 20px 15px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; position: relative; }
        .night-toggle { position: absolute; top: calc(env(safe-area-inset-top) + 15px); right: 20px; background: none; border: none; font-size: 22px; cursor: pointer; }
        .notif-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch; padding-bottom: 150px; }
        .footer-area { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 12px 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); display: flex; gap: 8px; align-items: center; z-index: 200; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; background: var(--msg-bg); backdrop-filter: blur(10px); color: var(--text); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .message-row { display: flex; width: 100%; }
        .message-row.me { justify-content: flex-end; }
        .timestamp { font-size: 0.65rem; color: var(--time); }
        #username { width: 100px; padding: 6px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
        #content { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; outline: none; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: 600; }
    </style>
</head>
<body>

    <header class="header-area">
        <button class="night-toggle" onclick="toggleTheme()">🌙</button>
        <h1 style="font-size: 1.1rem; margin: 0; color: var(--text); font-weight: 600;">Secret Board Pro</h1>
        <div style="display: flex; gap: 10px; align-items: center; margin-top: 8px;">
            <input type="text" id="username" placeholder="Name" oninput="localStorage.setItem('savedName', this.value)">
            <!-- Button hidden by default, shown via script if needed -->
            <button id="notif-req" class="notif-btn" onclick="requestNotifs()" style="display: none;">🔔 Enable Badge</button>
        </div>
    </header>

    <main id="messages"></main>

    <footer class="footer-area">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(this)">
        <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:22px;">➕</button>
        <input type="text" id="content" placeholder="Message..." onkeypress="if(event.key === 'Enter') handleSend()">
        <button class="btn-send" onclick="handleSend()">Send</button>
    </footer>

    <script>
        const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
        const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
        const client = supabase.createClient(SB_URL, SB_KEY);

        let lastFp = "";
        let unread = 0;

        // Service Worker registration
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js').catch(e => console.log("SW Error:", e)); 
        }

        // Show button only if permission not already granted
        if (Notification.permission !== 'granted') {
            document.getElementById('notif-req').style.display = 'block';
        }

        async function requestNotifs() {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                document.getElementById('notif-req').style.display = 'none';
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('nightMode', isDark ? 'on' : 'off');
        }

        function getUsernameColor(name) {
            let hash = 0;
            const str = name || "Anon";
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 75%, 50%)`;
        }

        async function fetchData(forceScroll = false) {
            const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: false }).limit(15);
            if (error || !data) return;
            const currentFp = JSON.stringify(data.map(m => m.id));

            if (lastFp !== "" && currentFp !== lastFp) {
                const latest = data[0];
                const me = localStorage.getItem('savedName') || "";
                // Logic: if not from me AND app is backgrounded
                if (latest.username !== me && (document.hidden || !document.hasFocus())) {
                    unread++;
                    if (navigator.setAppBadge) navigator.setAppBadge(unread).catch(() => {});
                }
            }

            if (currentFp === lastFp && !forceScroll) return;
            lastFp = currentFp;
            
            const container = document.getElementById('messages');
            container.innerHTML = '';
            data.reverse().forEach(m => {
                const isMe = m.username === (localStorage.getItem('savedName') || "");
                const color = getUsernameColor(m.username);
                const div = document.createElement('div');
                div.className = `message-row ${isMe ? 'me' : ''}`;
                div.innerHTML = `
                    <div class="msg" style="border-left: 5px solid ${isMe ? 'transparent' : color}">
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:4px; gap: 15px;">
                            <b style="color:${color}">${m.username || 'Anon'}</b>
                            <span class="timestamp">${new Date(m.created_at).toLocaleTimeString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div style="word-break: break-word;">${m.content || ''}</div>
                        ${m.image_data ? `<img src="${m.image_data}" style="max-width:100%; border-radius:8px; margin-top:8px; display:block;">` : ""}
                    </div>
                `;
                container.appendChild(div);
            });
            if (forceScroll) container.scrollTop = container.scrollHeight;
        }

        window.addEventListener('focus', () => {
            unread = 0;
            if (navigator.clearAppBadge) navigator.clearAppBadge();
        });

        async function handleSend() {
            const u = document.getElementById('username').value || "Anon";
            const c = document.getElementById('content').value;
            if (!c.trim()) return;
            document.getElementById('content').value = '';
            await client.from('messages').insert([{ username: u, content: c }]);
            fetchData(true);
        }

        async function handleFileUpload(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX_W = 350;
                    const scale = MAX_W / img.width;
                    canvas.width = MAX_W;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const compressed = canvas.toDataURL('image/jpeg', 0.6);
                    await client.from('messages').insert([{ username: document.getElementById('username').value || "Anon", image_data: compressed, content: "" }]);
                    fetchData(true);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        document.getElementById('username').value = localStorage.getItem('savedName') || "";
        if (localStorage.getItem('nightMode') === 'on') document.body.classList.add('dark-mode');
        fetchData(true);
        setInterval(() => fetchData(false), 4000);
    </script>
</body>
</html>
