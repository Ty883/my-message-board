<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Board Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/8943/8943377.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #ffffff; --text: #1a1a1b; --border: #e0e0e0; --msg-bg: rgba(255, 255, 255, 0.75); --accent: #6e8efb; --time: rgba(0, 0, 0, 0.4); }
        body.dark-mode { --bg: #18191a; --text: #ffffff; --border: #2c2d2e; --msg-bg: rgba(45, 45, 48, 0.9); --time: rgba(255, 255, 255, 0.5); }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: gradientBG 15s ease infinite; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .header-area { padding: calc(env(safe-area-inset-top) + 10px) 20px 15px; background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100; position: relative; }
        .night-toggle { position: absolute; top: calc(env(safe-area-inset-top) + 15px); right: 20px; background: none; border: none; font-size: 22px; cursor: pointer; }
        
        #room-select { 
            background: var(--border); border: none; padding: 8px 12px; border-radius: 12px; 
            font-family: inherit; font-size: 15px; font-weight: 600; color: var(--text); 
            margin-bottom: 10px; width: 180px; appearance: none; -webkit-appearance: none;
        }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch; padding-bottom: 150px; scroll-behavior: smooth; }
        
        .footer-area { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: var(--bg); 
            border-top: 1px solid var(--border); 
            padding: 12px 15px; 
            padding-bottom: calc(15px + env(safe-area-inset-bottom)); 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            z-index: 200;
            box-sizing: border-box; 
            width: 100%;
        }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; background: var(--msg-bg); backdrop-filter: blur(10px); color: var(--text); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .message-row { display: flex; width: 100%; }
        .message-row.me { justify-content: flex-end; }
        
        #username { width: 80px; padding: 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; box-sizing: border-box; }
        
        #content { 
            flex: 1; 
            min-width: 0; 
            padding: 12px; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            background: var(--bg); 
            color: var(--text); 
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box; 
        }
        
        .btn-send { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 20px; font-weight: 600; flex-shrink: 0; }

        .load-more-container { display: flex; justify-content: center; width: 100%; margin-bottom: 10px; }
        .btn-load-more { background: var(--msg-bg); backdrop-filter: blur(5px); border: 1px solid var(--border); color: var(--text); padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }
        
        .btn-icon { background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .recording { color: #e73c7e !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        audio { max-width: 240px; margin-top: 6px; display: block; border-radius: 8px; height: 36px; }
        
        #audio-preview-container {
            display: none;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
            background: var(--border);
            padding: 4px 8px;
            border-radius: 20px;
        }
        #audio-preview-container audio {
            margin-top: 0;
            flex: 1;
            max-width: 100%;
        }
        .btn-cancel-audio {
            background: none;
            border: none;
            font-size: 14px;
            color: #e73c7e;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            padding: 0 4px;
        }
    </style>
</head>
<body>

    <header class="header-area">
        <button class="night-toggle" onclick="toggleTheme()">🌙</button>
        
        <select id="room-select" onchange="changeRoom()">
            <option value="tyla">✨ TYLA</option>
            <option value="mom">❤️ MOM</option>
            <option value="nana">🪩 NANA</option>
        </select>

        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="username" placeholder="Name" oninput="localStorage.setItem('savedName', this.value)">
            <button id="notif-req" style="font-size: 11px; background: none; border: 1px solid var(--accent); color: var(--accent); border-radius: 10px; padding: 4px 10px;" onclick="requestNotifs()">🔔 Badge Fix</button>
        </div>
    </header>

    <main id="messages"></main>

    <footer class="footer-area">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(this)">
        <button class="btn-icon" onclick="document.getElementById('file-input').click()">➕</button>
        <button id="voice-btn" class="btn-icon" onclick="toggleRecording()">🎙️</button>
        
        <input type="text" id="content" placeholder="Message..." onkeypress="if(event.key === 'Enter') handleSend()">
        
        <div id="audio-preview-container">
            <audio id="audio-preview" controls></audio>
            <button class="btn-cancel-audio" onclick="cancelAudioDraft()">❌ Cancel</button>
        </div>

        <button class="btn-send" onclick="handleSend()">Send</button>
    </footer>

   <script>
        // --- SWAPPED BACK TO ORIGINAL CREDENTIALS ---
       const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhdGtxeHliZ2xkaHh6Z3FyYnhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTY5NTcsImV4cCI6MjA4OTY5Mjk1N30.ZkevB6e66Ypfzfv75KSpbY33i11VPfVNoNcV3Rv3ooY'; 
    const client = supabase.createClient(SB_URL, SB_KEY);

        let lastFp = "";
        let unread = 0;
        let activeRoom = localStorage.getItem('currentRoom') || 'tyla';
        let mainInterval = null;
        
        let currentLimit = 40; 
        let hasMoreMessages = true;

        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let stagedAudioBase64 = null; 

        document.getElementById('room-select').value = activeRoom;

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        async function requestNotifs() {
            if (!navigator.setAppBadge) {
                alert("Badging is only supported when this app is added to your Home Screen.");
                return;
            }
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                document.getElementById('notif-req').style.display = 'none';
                navigator.setAppBadge(0).catch(() => {});
            }
        }

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('nightMode', isDark ? 'on' : 'off');
        }

        function changeRoom() {
            activeRoom = document.getElementById('room-select').value;
            localStorage.setItem('currentRoom', activeRoom);
            
            lastFp = ""; 
            currentLimit = 40; 
            hasMoreMessages = true;
            cancelAudioDraft(); 

            document.getElementById('messages').innerHTML = '';

            const cached = localStorage.getItem('cache_' + activeRoom);
            if (cached) {
                renderMessages(JSON.parse(cached), true);
            } else {
                document.getElementById('messages').innerHTML = '<div style="text-align:center; padding:20px; color:var(--time);">Loading chat...</div>';
            }
            fetchData(true); 
        }

        function getUsernameColor(name) {
            let hash = 0;
            const str = name || "Anon";
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 75%, 50%)`;
        }

      async function fetchData(forceScroll = false) {
    try {
        // Optimization: If it's just a background sync check, only request 1 row to prevent lag
        const fetchLimit = forceScroll ? currentLimit : 1;
        
        let query = client.from('messages').select('*').order('created_at', { ascending: false }).limit(fetchLimit);
        
        const currentSelection = document.getElementById('room-select').value;
        
        if (currentSelection === 'tyla') {
            query = query.or(`room_id.eq.tyla,room_id.eq.general,room_id.is.null,room_id.eq.anna,room_id.eq.luke`);
        } else {
            query = query.eq('room_id', currentSelection);
        }

        const { data, error } = await query;
        if (error) {
            console.log("Supabase query error:", error);
            return;
        }
        
        if (!data || !Array.isArray(data) || data.length === 0) {
            if (forceScroll) {
                document.getElementById('messages').innerHTML = '<div style="text-align:center; padding:20px; color:var(--time);">No messages here yet.</div>';
            }
            // Only update button tracking during full history loads
            if (forceScroll) hasMoreMessages = false;
            return; 
        }

        // Only modify the "Load Previous" button state during a full load request
        if (forceScroll) {
            hasMoreMessages = data.length === currentLimit;
        }
        
        const currentFp = JSON.stringify(data.map(m => m.id));

        if (lastFp !== "" && currentFp !== lastFp) {
            const latest = data[0];
            const me = localStorage.getItem('savedName') || "";
            if (latest.username !== me) {
                unread++;
                if (navigator.setAppBadge) navigator.setAppBadge(unread).catch(() => {});
            }
        }

        if (currentFp === lastFp && !forceScroll) return;
        
        // If background sync detects a new message, trigger a full re-render
        if (!forceScroll && currentFp !== lastFp && lastFp !== "") {
            fetchData(true);
            return;
        }

        lastFp = currentFp;
        
        if (forceScroll) {
            localStorage.setItem('cache_' + currentSelection, JSON.stringify(data));
            renderMessages(data, forceScroll);
        }
    } catch (e) {
        console.log("Fetch failed, will retry...", e);
    }
}

        function loadPrevious() {
            currentLimit += 40; 
            fetchData(false);
        }

        function renderMessages(data, forceScroll) {
            const container = document.getElementById('messages');
            const oldScrollHeight = container.scrollHeight;
            const oldScrollTop = container.scrollTop;

            container.innerHTML = '';

            if (hasMoreMessages) {
                const btnDiv = document.createElement('div');
                btnDiv.className = 'load-more-container';
                btnDiv.innerHTML = `<button class="btn-load-more" onclick="loadPrevious()">Load Previous Messages</button>`;
                container.appendChild(btnDiv);
            }

            [...data].reverse().forEach(m => {
                const isMe = m.username === (localStorage.getItem('savedName') || "");
                const color = getUsernameColor(m.username);
                const div = document.createElement('div');
                div.className = `message-row ${isMe ? 'me' : ''}`;
                
                let specialContent = "";
                if (m.image_data) {
                    specialContent = `<img src="${m.image_data}" style="max-width:100%; border-radius:8px; margin-top:8px; display:block;">`;
                } else if (m.audio_data) {
                    specialContent = `<audio src="${m.audio_data}" controls controlsList="nodownload"></audio>`;
                }

                div.innerHTML = `
                    <div class="msg" style="border-left: 5px solid ${isMe ? 'transparent' : color}">
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; margin-bottom:4px; gap: 15px;">
                            <b style="color:${color}">${m.username || 'Anon'}</b>
                            <span style="color:var(--time)">${new Date(m.created_at).toLocaleDateString([], {month:'short', day:'numeric'})}, ${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div style="word-break: break-word;">${m.content || ''}</div>
                        ${specialContent}
                    </div>
                `;
                container.appendChild(div);
            });

            if (forceScroll) {
                container.scrollTop = container.scrollHeight;
            } else {
                container.scrollTop = oldScrollTop + (container.scrollHeight - oldScrollHeight);
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('voice-btn');
            const txtInput = document.getElementById('content');
            const previewContainer = document.getElementById('audio-preview-container');
            const previewPlayer = document.getElementById('audio-preview');
            
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (e) => { audioChunks.push(e.data); };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        previewPlayer.src = audioUrl;

                        const reader = new FileReader();
                        reader.onloadend = () => {
                            stagedAudioBase64 = reader.result;
                            txtInput.style.display = 'none';
                            previewContainer.style.display = 'flex';
                        };
                        reader.readAsDataURL(audioBlob);
                        
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    btn.classList.add('recording');
                    btn.innerText = "🛑";
                } catch (err) {
                    alert("Microphone access denied or unsupported on this device layout.");
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
                btn.innerText = "🎙️";
            }
        }

        function cancelAudioDraft() {
            stagedAudioBase64 = null;
            document.getElementById('audio-preview').src = '';
            document.getElementById('audio-preview-container').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function startSync() {
            if (mainInterval) clearInterval(mainInterval);
            mainInterval = setInterval(() => fetchData(false), 3000);
        }

        window.addEventListener('focus', () => {
            unread = 0;
            if (navigator.clearAppBadge) navigator.clearAppBadge().catch(()=>{});
            startSync();
        });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                startSync();
            } else {
                clearInterval(mainInterval);
                mainInterval = setInterval(() => fetchData(false), 10000);
                setTimeout(() => clearInterval(mainInterval), 300000);
            }
        });

        async function handleSend() {
            const u = document.getElementById('username').value || "Anon";
            const currentRoom = document.getElementById('room-select').value;
            
            if (stagedAudioBase64) {
                const audioPayload = stagedAudioBase64;
                cancelAudioDraft(); 
                const { error } = await client.from('messages').insert([{ 
                    username: u, 
                    content: "🎙️ Sent a voice note", 
                    audio_data: audioPayload, 
                    room_id: currentRoom 
                }]);
                if (error) console.error("Voice note insert error:", error.message);
                fetchData(true);
                return;
            }

            const c = document.getElementById('content').value;
            if (!c.trim()) return;
            document.getElementById('content').value = '';
            
            const { error } = await client.from('messages').insert([{ username: u, content: c, room_id: currentRoom }]);
            if (error) {
                console.error("Message insert error:", error.message);
                alert("Database blocked message. Did you disable RLS in your table settings?");
            }
            fetchData(true);
        }

        async function handleFileUpload(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX_W = 350;
                    const scale = MAX_W / img.width;
                    canvas.width = MAX_W;
                    canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const compressed = canvas.toDataURL('image/jpeg', 0.6);
                    
                    const currentRoom = document.getElementById('room-select').value;
                    const { error } = await client.from('messages').insert([{ 
                        username: document.getElementById('username').value || "Anon", 
                        image_data: compressed, 
                        content: "", 
                        room_id: currentRoom 
                    }]);
                    if (error) console.error("Image insert error:", error.message);
                    fetchData(true);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        // --- INITIALIZATION ---
        document.getElementById('username').value = localStorage.getItem('savedName') || "";
        if (localStorage.getItem('nightMode') === 'on') document.body.classList.add('dark-mode');
        
        if (Notification.permission === 'granted' || !navigator.setAppBadge) {
            document.getElementById('notif-req').style.display = 'none';
        }

        const initCache = localStorage.getItem('cache_' + activeRoom);
        if (initCache) renderMessages(JSON.parse(initCache), true);
        
        fetchData(true);
        startSync(); 
    </script>
</body>
</html>
