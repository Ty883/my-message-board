<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Board</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
    :root { --bg: #ffffff; --text: #1a1a1b; --msg-bg: #f0f2f5; }
    body.dark-mode { --bg: #18191a; --text: #e4e6eb; --msg-bg: #242526; }

    body { 
        background-color: var(--bg); 
        color: var(--text); 
        font-family: system-ui, sans-serif; 
        transition: 0.3s; 
        padding: 20px;
    }

    #messages { 
        height: 400px; 
        overflow-y: auto; 
        border: 1px solid #ccc; 
        padding: 10px; 
        margin-bottom: 20px; 
    }

    .msg { 
        background-color: var(--msg-bg); 
        padding: 12px; 
        margin-bottom: 10px; 
        border-radius: 8px; 
        display: flex; 
        flex-direction: column; 
    }

    .like-container { 
        display: flex; 
        justify-content: flex-end; 
        margin-top: 5px; 
    }

    .btn-like { 
        width: auto !important; 
        padding: 2px 8px; 
        font-size: 0.8rem; 
        cursor: pointer; 
        border-radius: 15px; 
        border: 1px solid #ddd;
    }

    input { padding: 8px; margin-right: 5px; }
</style>
</head>
<body>

    <button onclick="window.toggleNightMode()" style="width: auto;">
    🌙 Toggle Night Mode
</button>
    <h2>Secret Message Board</h2>
    <div id="messages">Connecting to database...</div>

    <input type="text" id="username" placeholder="Your Name" 
       oninput="localStorage.setItem('savedName', this.value); fetchData();" 
       style="width: 20%; margin-bottom: 10px;">

<input type="text" id="content" placeholder="Type a message..." 
       onkeypress="if(event.key === 'Enter') window.handleSend()" 
       style="width: 60%;">

<button onclick="window.handleSend()" style="width: 15%;">Send</button>
    
  <script>
    const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
    const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
    let client;

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
        return `hsl(${Math.abs(hash) % 360}, 70%, 45%)`;
    }

      window.toggleNightMode = function() {
    // 1. Flip the class on the body
    const isDark = document.body.classList.toggle('dark-mode');
    
    // 2. Save the choice to the "digital notebook"
    if (isDark) {
        localStorage.setItem('theme', 'dark');
    } else {
        localStorage.setItem('theme', 'light');
    }
};

    // --- 1. THE SEND FUNCTION ---
    window.handleSend = async function() {
        const u = document.getElementById('username').value;
        const c = document.getElementById('content').value;
        if (!u || !c) return alert("Please enter your name and a message!");

        const { error } = await client.from('messages').insert([{ username: u, content: c, likes: 0 }]);
        if (error) {
            alert("Error sending: " + error.message);
        } else {
            document.getElementById('content').value = ''; // Clear message box
            fetchData();
        }
    };

    // --- 2. THE LIKE FUNCTION ---
    window.addLike = async function(id, currentLikes) {
        const { error } = await client.from('messages').update({ likes: (currentLikes || 0) + 1 }).eq('id', id);
        if (error) console.error(error);
        else fetchData();
    };

    // --- 3. THE RENDER FUNCTION ---
    async function fetchData() {
        if (!client) return;
        const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: true });
        if (error) return console.error(error);

        const currentUser = document.getElementById('username').value;
        const container = document.getElementById('messages');
        
        container.innerHTML = data.map(m => {
            const isMe = m.username === currentUser && currentUser !== "";
            const sideClass = isMe ? "me" : "them";
            const userColor = stringToColor(m.username || "Anon");
            
            const isImg = m.content.match(/\.(jpeg|jpg|gif|png)$/) != null && m.content.startsWith('http');
            const display = isImg ? `<img src="${m.content}" style="max-width:100%; border-radius:5px; margin-top:5px;"/>` : m.content;
            
            return `
                <div class="message-row ${sideClass}">
                    <div class="msg" style="${isMe ? 'border-right' : 'border-left'}: 5px solid ${userColor}">
                        <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-bottom:4px;">
                            <strong style="color:${isMe ? 'white' : userColor}">${m.username}</strong>
                        </div>
                        <div style="word-wrap: break-word;">${display}</div>
                        <div class="like-container">
                            <button class="btn-like" onclick="window.addLike(${m.id}, ${m.likes || 0})">❤️ ${m.likes || 0}</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    // --- 4. THE STARTUP ---
    async function init() {
        // Load saved name from browser memory
        const savedName = localStorage.getItem('savedName');
        if (savedName) {
            document.getElementById('username').value = savedName;
        }

        if (window.supabase) {
            client = window.supabase.createClient(SB_URL, SB_KEY);
            fetchData();
            setInterval(fetchData, 3000);
        } else {
            setTimeout(init, 500); // Try again if Supabase hasn't loaded
        }
    }

    init();
</script>
</body>
</html>
