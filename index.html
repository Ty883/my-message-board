<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Board</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
    :root { --bg: #ffffff; --text: #1a1a1b; --msg-bg: #f0f2f5; }
    body.dark-mode { --bg: #18191a; --text: #e4e6eb; --msg-bg: #242526; }

    body { 
        background-color: var(--bg); 
        color: var(--text); 
        font-family: system-ui, sans-serif; 
        transition: 0.3s; 
        padding: 20px;
    }

    #messages { 
        height: 400px; 
        overflow-y: auto; 
        border: 1px solid #ccc; 
        padding: 10px; 
        margin-bottom: 20px; 
    }

    .msg { 
        background-color: var(--msg-bg); 
        padding: 12px; 
        margin-bottom: 10px; 
        border-radius: 8px; 
        display: flex; 
        flex-direction: column; 
    }

    .like-container { 
        display: flex; 
        justify-content: flex-end; 
        margin-top: 5px; 
    }

    .btn-like { 
        width: auto !important; 
        padding: 2px 8px; 
        font-size: 0.8rem; 
        cursor: pointer; 
        border-radius: 15px; 
        border: 1px solid #ddd;
    }

    input { padding: 8px; margin-right: 5px; }
</style>
</head>
<body>

    <button onclick="document.body.classList.toggle('dark-mode')" 
        style="width: auto; padding: 10px; cursor: pointer; border-radius: 50px;">
    🌓 Toggle Night Mode
</button>
    <h2>Secret Message Board</h2>
    <div id="messages">Connecting to database...</div>

    <input type="text" id="username" placeholder="Your Name" 
       oninput="localStorage.setItem('savedName', this.value); fetchData();">
    <input type="text" id="content" placeholder="Type a message...">
    <button onclick="window.handleSend()">Post Message</button>

  <script>
    const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
    const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
    let client;

    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
        return `hsl(${Math.abs(hash) % 360}, 70%, 45%)`;
    }

    // 1. ATTACH FUNCTIONS TO WINDOW IMMEDIATELY
    window.handleSend = async function() {
        const u = document.getElementById('username').value;
        const c = document.getElementById('content').value;
        if (!u || !c) return alert("Fill both fields");

        const { error } = await client.from('messages').insert([{ username: u, content: c, likes: 0 }]);
        if (error) alert(error.message);
        else {
            document.getElementById('content').value = '';
            fetchData();
        }
    };

    window.addLike = async function(id, currentLikes) {
        const { error } = await client.from('messages').update({ likes: (currentLikes || 0) + 1 }).eq('id', id);
        if (error) console.error(error);
        else fetchData();
    };

    // 2. FETCH DATA
    async function fetchData() {
        if (!client) return;
        const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: true });
        if (error) return;

        const container = document.getElementById('messages');
        container.innerHTML = data.map(m => {
            const userColor = stringToColor(m.username || "Anon");
            const isImg = m.content.match(/\.(jpeg|jpg|gif|png)$/) != null && m.content.startsWith('http');
            const display = isImg ? `<img src="${m.content}" style="max-width:100%; border-radius:5px;"/>` : m.content;
            
            return `
                <div class="msg" style="border-left: 5px solid ${userColor}">
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                        <strong style="color:${userColor}">${m.username}</strong>
                    </div>
                    <div style="margin: 5px 0;">${display}</div>
                    <div class="like-container">
                        <button class="btn-like" onclick="window.addLike(${m.id}, ${m.likes || 0})">❤️ ${m.likes || 0}</button>
                    </div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    // 3. STARTUP
   async function init() {
    // 1. Check if a name was saved previously
    const savedName = localStorage.getItem('savedName');
    if (savedName) {
        document.getElementById('username').value = savedName;
    }

    if (window.supabase) {
        client = window.supabase.createClient(SB_URL, SB_KEY);
        fetchData();
        setInterval(fetchData, 3000);
    } else {
        setTimeout(init, 500);
    }
}

            client = window.supabase.createClient(SB_URL, SB_KEY);
            fetchData();
            setInterval(fetchData, 3000);
        } else {
            setTimeout(init, 500);
        }
    }
    init();
</script>
</body>
</html>
