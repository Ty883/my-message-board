<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Board</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        #messages { border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 20px; background: #fafafa; border-radius: 8px; }
        .msg { background: white; padding: 10px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #eee; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Public Message Board</h2>
    <div id="messages">Connecting to database...</div>

    <input type="text" id="username" placeholder="Your Name">
    <input type="text" id="content" placeholder="Type a message...">
    <button onclick="window.handleSend()">Post Message</button>

    <script>
    const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
    const SB_KEY = 'supabase login
supabase init
supabase link --project-ref iatkqxybgldhxzgqrbxq';
    
    let client;

    async function init() {
        if (window.supabase) {
            client = window.supabase.createClient(SB_URL, SB_KEY);
            fetchData();
            setInterval(fetchData, 3000);
        } else {
            setTimeout(init, 500);
        }
    }

    async function fetchData() {
        const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: true });
        if (error) return console.error(error);
        
        const container = document.getElementById('messages');
        container.innerHTML = data.map(m => `<div class="msg"><strong>${m.username}:</strong> ${m.content}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    }

    // By putting 'window.' in front, we guarantee the button can find it
    window.handleSend = async function() {
        const u = document.getElementById('username').value;
        const c = document.getElementById('content').value;
        if (!u || !c) return alert("Enter name and message");

        const { error } = await client.from('messages').insert([{ username: u, content: c }]);
        if (error) {
            alert("Database Error: " + error.message);
        } else {
            document.getElementById('content').value = '';
            fetchData();
        }
    };

    init();
</script>
</body>
</html>
