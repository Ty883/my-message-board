<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Board Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1b; --accent: #6e8efb; --msg-bg: rgba(255, 255, 255, 0.8); }
        body.dark-mode { --bg: #18191a; --text: #ffffff; --msg-bg: rgba(45, 45, 48, 0.9); }
        body { font-family: 'Poppins', sans-serif; background: #6e8efb; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; background: var(--bg); display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 100px; }
        .msg { max-width: 85%; padding: 10px; border-radius: 15px; background: var(--msg-bg); color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg.me { align-self: flex-end; border-bottom-right-radius: 2px; background: var(--accent); color: white; }
        .img-msg { max-width: 100%; border-radius: 10px; margin-top: 5px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--bg); padding: 10px; display: flex; gap: 8px; box-sizing: border-box; }
        input { padding: 10px; border-radius: 20px; border: 1px solid #ddd; background: var(--bg); color: var(--text); }
        .react-btn { border: none; background: rgba(0,0,0,0.05); border-radius: 8px; padding: 3px 6px; font-size: 12px; margin-top: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <input type="text" id="username" placeholder="Name" oninput="localStorage.setItem('savedName', this.value)" style="width: 80px;">
        <button onclick="document.body.classList.toggle('dark-mode')" style="background:none; border:none; font-size:20px;">🌙</button>
    </header>

    <main id="messages"></main>

    <footer class="footer">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(this)">
        <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:22px;">➕</button>
        <input type="text" id="content" placeholder="Message..." style="flex:1;" onkeypress="if(event.key==='Enter') handleSend()">
        <button onclick="handleSend()" style="background:#6e8efb; color:white; border:none; padding:10px 15px; border-radius:20px;">Send</button>
    </footer>

    <script>
        const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
        const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
        const client = supabase.createClient(SB_URL, SB_KEY);

        let lastFp = "";
        const EMOJIS = ['❤️', '😂', '🔥'];

        async function fetchData() {
            // FIX 1: Limit to only 10 messages to avoid timeout
            const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: false }).limit(10);
            if (error || !data) return;

            const fp = JSON.stringify(data);
            if (fp === lastFp) return;
            lastFp = fp;

            const container = document.getElementById('messages');
            const user = localStorage.getItem('savedName') || "";
            
            container.innerHTML = data.reverse().map(m => {
                const isMe = m.username === user;
                const reacts = m.reactions || {};
                const img = m.image_data ? `<img src="${m.image_data}" class="img-msg">` : "";
                const rHtml = EMOJIS.map(e => `<button class="react-btn" onclick="addReaction('${m.id}', '${e}')">${e} ${reacts[e] || 0}</button>`).join(' ');

                return `<div class="msg ${isMe ? 'me' : ''}">
                    <strong style="font-size: 10px; opacity: 0.7;">${m.username || 'Anon'}</strong>
                    <div>${m.content || ''}</div>
                    ${img}
                    <div>${rHtml}</div>
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function handleSend() {
            const u = document.getElementById('username').value || "Anon";
            const c = document.getElementById('content').value;
            if (!c.trim()) return;
            document.getElementById('content').value = '';
            await client.from('messages').insert([{ username: u, content: c, reactions: {} }]);
            fetchData();
        }

        async function handleFileUpload(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const reader = new FileReader();

            reader.onload = (e) => {
                const img = new Image();
                img.onload = async () => {
                    // FIX 2: Compress image to 400px wide before sending
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const scale = 400 / img.width;
                    canvas.width = 400;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const compressed = canvas.toDataURL('image/jpeg', 0.6); // 60% quality
                    const u = document.getElementById('username').value || "Anon";
                    await client.from('messages').insert([{ username: u, image_data: compressed, content: "", reactions: {} }]);
                    fetchData();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function addReaction(msgId, emoji) {
            const { data } = await client.from('messages').select('reactions').eq('id', msgId).single();
            let r = data.reactions || {};
            r[emoji] = (r[emoji] || 0) + 1;
            await client.from('messages').update({ reactions: r }).eq('id', msgId);
            fetchData();
        }

        document.getElementById('username').value = localStorage.getItem('savedName') || "";
        fetchData();
        setInterval(fetchData, 5000); // 5-second sync to reduce server load
    </script>
</body>
</html>
