<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Message Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #1a1a1b; 
            --border: #e0e0e0;
            --msg-bg: rgba(255, 255, 255, 0.7);
            --accent: #6e8efb;
        }
        body.dark-mode {
            --bg: #18191a;
            --text: #ffffff;
            --border: #3a3b3c;
            --msg-bg: rgba(36, 37, 38, 0.8);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            height: 100dvh; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-area {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 95px; /* Increased height for stacked layout */
            background: var(--bg) !important;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column; /* Stack Title and Username */
            align-items: flex-start;
            justify-content: center;
            padding: 0 20px;
            gap: 5px;
            z-index: 2000;
        }

        #messages {
            position: absolute;
            top: 95px; /* Adjust to match new header height */
            bottom: 85px; 
            left: 0; right: 0;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .footer-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            min-height: 75px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 10px 15px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            gap: 10px;
            z-index: 9999;
        }

        .message-row { display: flex; width: 100%; }
        .message-row.me { justify-content: flex-end; }
        .message-row.them { justify-content: flex-start; }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            background: var(--msg-bg);
            backdrop-filter: blur(10px);
            color: var(--text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            transition: border-left 0.3s ease;
        }

        .chat-img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
        }
