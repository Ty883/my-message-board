<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Board Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff" id="theme-meta">
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #ffffff; --text: #1a1a1b; --border: #e0e0e0;
            --msg-bg: rgba(255, 255, 255, 0.7); --accent: #6e8efb;
            --time: rgba(0, 0, 0, 0.4);
        }
        body.dark-mode {
            --bg: #18191a; --text: #ffffff; --border: #2c2d2e;
            --msg-bg: rgba(40, 40, 42, 0.85); --time: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-area {
            padding: calc(env(safe-area-inset-top) + 10px) 20px 10px;
            background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100;
        }

        #messages {
            flex: 1; overflow-y: auto; padding: 20px 20px 150px; 
            display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch;
        }

        .footer-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg); border-top: 1px solid var(--border);
            padding: 12px 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: flex; gap: 8px; align-items: center; z-index: 200;
        }

        .message-row { display: flex; width: 100%; margin-bottom: 5px; position: relative; }
