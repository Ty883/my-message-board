<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Board Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff" id="theme-meta">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/000000/chat.png?v=10">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/192/000000/chat.png?v=10">

    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.js" async=""></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
         appId: "85132153-80b2-4746-831f-5ece8e5614b9",
          allowLocalhostAsSecureOrigin: true,
        });
      });
    </script>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #ffffff; --text: #1a1a1b; --border: #e0e0e0;
            --msg-bg: rgba(255, 255, 255, 0.7); --accent: #6e8efb;
            --time: rgba(0, 0, 0, 0.4);
        }
        body.dark-mode {
            --bg: #18191a; --text: #ffffff; --border: #2c2d2e;
            --msg-bg: rgba(40, 40, 42, 0.85); --time: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-area {
            padding: calc(env(safe-area-inset-top) + 10px) 20px 10px;
            background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100;
        }

        #messages {
            flex: 1; overflow-y: auto; padding: 20px 20px 150px; 
            display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch;
        }

        .footer-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg); border-top: 1px solid var(--border);
            padding: 12px 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: flex; gap: 8px; align-items: center; z-index: 200;
        }

        .message-row { display: flex; width: 100%; margin-bottom: 5px; position: relative; }
        .message-row.me { justify-content: flex-end; }
        
        .msg {
            max-width: 85%; padding: 12px 16px; border-radius: 18px;
            background: var(--msg-bg); backdrop-filter: blur(12px);
            color: var(--text); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .msg-header { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 4px; }
        .timestamp { font-size: 0.65rem; color: var(--time); font-weight: 300; }

        .reactions { margin-top: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
        .reaction-btn { 
            background: rgba(0,0,0,0.05); border: none; border-radius: 12px; 
            padding: 2px 8px; font-size: 14px; cursor: pointer; color: var(--text);
        }
        body.dark-mode .reaction-btn { background: rgba(255,255,255,0.1); }

        .chat-img {
            max-width: 100%; max-height: 300px; border-radius: 12px;
            margin-top: 8px; display: block; cursor: pointer;
        }

        #username { width: 90px; padding: 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
        #content { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; }
        
        .btn-icon { background: none; border: none; font-size: 22px; cursor: pointer; padding: 5px; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: 600; }
        
        .top-controls { position: absolute; top: calc(env(safe-area-inset-top) + 15px); right: 15px; z-index: 300; display: flex; gap: 15px; }

        @media (min-width: 1000px) { .msg { max-width: 60%; } }
    </style>
</head>
<body>

    <div class="top-controls">
        <button class="btn-icon" onclick="subscribeToPush()">🔔</button>
        <button class="btn-icon" onclick="toggleNightMode()">🌙</button>
    </div>

    <header class="header-area">
        <h1 style="font-size: 1.1rem; margin: 5px 0; color: var(--text);">Secret Message Board</h1>
        <input type="text" id="username" placeholder="Name" oninput="saveName(this.value)">
    </header>

    <main id="messages"></main>

    <footer class="footer-area">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(this)">
        <button class="btn-icon" onclick="document.getElementById('file-input').click()">➕</button>
        <input type="text" id="content" placeholder="Message..." onkeypress="if(event.key === 'Enter') handleSend()">
        <button class="btn-send" onclick="handleSend()">Send</button>
    </footer>

    <script>
        const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
        const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
        const client = supabase.createClient(SB_URL, SB_KEY);

        function saveName(val) { localStorage.setItem('savedName', val); }
        function loadName() { 
            const n = localStorage.getItem('savedName');
            if(n) document.getElementById('username').value = n;
        }

        function getUsernameColor(str) {
            let hash = 0; const name = str || "Anon";
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 75%, 50%)`;
        }

        function formatTime(ts) { return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }

        async function fetchData() {
            const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: false }).limit(40);
            if (error) return;
            const displayData = data ? data.reverse() : [];
            const fingerprint = JSON.stringify(displayData);
            if (window.lastFingerprint === fingerprint) return;
            window.lastFingerprint = fingerprint;
            
            console.log("OneSignal Check:", window.OneSignalDeferred ? "READY" : "MISSING");

            const container = document.getElementById('messages');
            const currentUser = localStorage.getItem('savedName');
            
            container.innerHTML = displayData.map(m => {
                const isMe = m.username === currentUser;
                const color = getUsernameColor(m.username);
                const imgTag = m.image_data ? `<img src="${m.image_data}" class="chat-img" onclick="window.open(this.src)">` : "";
                
                // Reaction logic
                const reactions = m.reactions || {};
                const reactionHTML = Object.entries(reactions).map(([emoji, count]) => 
                    `<button class="reaction-btn" onclick="addReaction('${m.id}', '${emoji}')">${emoji} ${count}</button>`
                ).join('');

                return `
                    <div class="message-row ${isMe ? 'me' : 'them'}">
                        <div class="msg" style="border-left: 5px solid ${color}">
                            <div class="msg-header">
                                <strong style="font-size: 0.75rem; color: ${color}; font-weight: 600;">${m.username}</strong>
                                <span class="timestamp">${formatTime(m.created_at)}</span>
                            </div>
                            <div style="word-break: break-word;">${m.content || ''}</div>
                            ${imgTag}
                            <div class="reactions">
                                ${reactionHTML}
                                <button class="reaction-btn" onclick="promptReaction('${m.id}')">+</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        async function handleSend() {
            const u = document.getElementById('username').value || "Anon";
            const c = document.getElementById('content').value;
            if (!c.trim()) return;
            document.getElementById('content').value = '';
            const { error } = await client.from('messages').insert([{ username: u, content: c }]);
            if(!error) sendPushNotification(u, c);
            fetchData();
        }

        async function addReaction(msgId, emoji) {
            const { data } = await client.from('messages').select('reactions').eq('id', msgId).single();
            let reactions = data.reactions || {};
            reactions[emoji] = (reactions[emoji] || 0) + 1;
            await client.from('messages').update({ reactions }).eq('id', msgId);
            fetchData();
        }

        function promptReaction(msgId) {
            const emoji = prompt("Enter an emoji:");
            if (emoji) addReaction(msgId, emoji);
        }

        async function handleFileUpload(input) {
            if (!input.files?.[0]) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const u = document.getElementById('username').value || "Anon";
                await client.from('messages').insert([{ username: u, image_data: e.target.result, content: "" }]);
                fetchData();
            };
            reader.readAsDataURL(input.files[0]);
        }

        document.addEventListener('paste', async (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (const item of items) {
                if (item.type.includes("image")) {
                    const file = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const u = document.getElementById('username').value || "Anon";
                        await client.from('messages').insert([{ username: u, image_data: event.target.result, content: "" }]);
                        fetchData();
                    };
                    reader.readAsDataURL(file);
                }
            }
        });

        async function sendPushNotification(sender, text) {
            const appId = "85132153-80b2-4746-831f-5ece8e5614b9";
            const apiKey = "os_v2_app_qujscu4awjdunay7l3hi4vquxfoa62voblsedleorixdazfguggrdhphwviwlyrh424japyswgrrcws6fbsbcwfdyrarkh5r2ciklzy";
            if(appId.includes("YOUR")) return;
            
            await fetch("https://onesignal.com/api/v1/notifications", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Basic ${apiKey}` },
                body: JSON.stringify({
                    app_id: appId,
                    included_segments: ["All"],
                    headings: { "en": `New message from ${sender}` },
                    contents: { "en": text }
                })
            });
        }

     async function subscribeToPush() {
    // 1. Visual feedback so you know the click worked
    const btn = document.getElementById('bell-button');
    if(btn) btn.style.opacity = "0.5"; 

    console.log("Checking OneSignal Status...");

    // 2. Check if the SDK is even on the page
    if (!window.OneSignalDeferred) {
        alert("CRITICAL: OneSignal SDK not found in <head>. Check your script tags!");
        return;
    }

    // 3. Force a permission request
    window.OneSignalDeferred.push(async function(OneSignal) {
        console.log("OneSignal is active. Requesting...");
        try {
            // This is the direct 'Ask' command
            await OneSignal.Notifications.requestPermission();
            alert("Permission request sent to your browser/phone!");
        } catch (e) {
            alert("Error during request: " + e.message);
        } finally {
            if(btn) btn.style.opacity = "1";
        }
    });
}
        function toggleNightMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-meta').setAttribute("content", isDark ? "#18191a" : "#ffffff");
        }

        loadName();
        if (localStorage.getItem('theme') === 'dark') toggleNightMode();
        fetchData();
        setInterval(fetchData, 3000);
        window.addEventListener('focus', () => { loadName(); fetchData(); });
    </script>
</body>
</html>
