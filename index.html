<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Board</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
    :root { --bg: #ffffff; --text: #1a1a1b; --msg-bg: #f0f2f5; }
    body.dark-mode { --bg: #18191a; --text: #e4e6eb; --msg-bg: #242526; }

    body { 
        background-color: var(--bg); 
        color: var(--text); 
        font-family: system-ui, sans-serif; 
        transition: 0.3s; 
        padding: 20px;
    }

    #messages { 
        height: 400px; 
        overflow-y: auto; 
        border: 1px solid #ccc; 
        padding: 10px; 
        margin-bottom: 20px; 
    }

    .msg { 
        background-color: var(--msg-bg); 
        padding: 12px; 
        margin-bottom: 10px; 
        border-radius: 8px; 
        display: flex; 
        flex-direction: column; 
    }

    .like-container { 
        display: flex; 
        justify-content: flex-end; 
        margin-top: 5px; 
    }

    .btn-like { 
        width: auto !important; 
        padding: 2px 8px; 
        font-size: 0.8rem; 
        cursor: pointer; 
        border-radius: 15px; 
        border: 1px solid #ddd;
    }

    input { padding: 8px; margin-right: 5px; }
</style>
</head>
<body>

    <button onclick="window.toggleNightMode()" style="width: auto;">
    🌙 Toggle Night Mode
</button>
    <h2>Secret Message Board</h2>
    <div id="messages">Connecting to database...</div>

    <input type="text" id="username" placeholder="Name" oninput="window.saveName(this.value)">
    <input type="text" id="content" placeholder="Message..." onkeypress="if(event.key === 'Enter') window.handleSend()">

<button onclick="window.handleSend()">Send</button>

    
<script>
    const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
    const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
    let client;

    // --- 1. HELPERS & SAVERS ---
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
        return `hsl(${Math.abs(hash) % 360}, 70%, 45%)`;
    }

    window.toggleNightMode = function() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };

    window.saveName = function(name) {
        localStorage.setItem('savedName', name);
        fetchData(); // Refresh to update "Me vs Them" alignment instantly
    };

    // --- 2. THE SEND & LIKE LOGIC ---
    window.handleSend = async function() {
        const u = document.getElementById('username').value;
        const c = document.getElementById('content').value;
        if (!u || !c) return alert("Enter your name and a message!");

        const { error } = await client.from('messages').insert([{ username: u, content: c, likes: 0 }]);
        if (error) {
            alert("Error: " + error.message);
        } else {
            document.getElementById('content').value = '';
            fetchData();
        }
    };

    window.addLike = async function(id, currentLikes) {
        await client.from('messages').update({ likes: (currentLikes || 0) + 1 }).eq('id', id);
        fetchData();
    };

    // --- 3. THE RENDER LOGIC ---
    async function fetchData() {
        if (!client) return;
        const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: true });
        if (error) return;

        const currentUser = document.getElementById('username').value;
        const container = document.getElementById('messages');
        
        container.innerHTML = data.map(m => {
            const isMe = m.username === currentUser && currentUser !== "";
            const userColor = stringToColor(m.username || "Anon");
            const isImg = m.content.match(/\.(jpeg|jpg|gif|png)$/) != null && m.content.startsWith('http');
            const display = isImg ? `<img src="${m.content}" style="max-width:100%; border-radius:5px;"/>` : m.content;
            
            return `
                <div class="message-row ${isMe ? 'me' : 'them'}">
                    <div class="msg" style="${isMe ? 'border-right' : 'border-left'}: 5px solid ${userColor}">
                        <div style="font-size:0.75rem; margin-bottom:4px;">
                            <strong style="color:${isMe ? 'white' : userColor}">${m.username}</strong>
                        </div>
                        <div>${display}</div>
                        <div class="like-container">
                            <button class="btn-like" onclick="window.addLike(${m.id}, ${m.likes || 0})">❤️ ${m.likes || 0}</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    // --- 4. STARTUP ---
    async function init() {
        // Load Theme
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
        
        // Load Name
        const saved = localStorage.getItem('savedName');
        if (saved) document.getElementById('username').value = saved;

        if (window.supabase) {
            client = window.supabase.createClient(SB_URL, SB_KEY);
            fetchData();
            setInterval(fetchData, 3000);
        } else {
            setTimeout(init, 500);
        }
    }
    init();
</script>
</body>
</html>
