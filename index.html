<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message Board</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* 1. Default (Light) Colors */
:root {
    --bg: #ffffff;
    --text: #1a1a1b;
    --msg-bg: #f0f2f5;
    --input-bg: #ffffff;
}

/* 2. When the 'dark-mode' class is added to the body, swap the colors */
body.dark-mode {
    --bg: #18191a;
    --text: #e4e6eb;
    --msg-bg: #242526;
    --input-bg: #3a3b3c;
}

/* 3. Apply the variables to your elements */
body {
    background-color: var(--bg);
    color: var(--text);
    transition: background 0.3s ease; /* Makes the transition smooth! */
    font-family: sans-serif;
}

.msg {
    background-color: var(--msg-bg);
    border: 1px solid rgba(0,0,0,0.1);
    color: var(--text);
}

.msg {
    display: flex;
    flex-direction: column; /* Stack name, content, and button vertically */
    position: relative;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
}

/* This container wraps the button to push it to the right */
.like-container {
    display: flex;
    justify-content: flex-end; /* Pushes content to the right */
    margin-top: 8px;
}

/* The actual small button */
.btn-like {
    width: auto !important; /* Overrides any full-width settings */
    padding: 2px 8px !important;
    font-size: 0.75rem !important;
    border-radius: 12px !important;
    background: rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.1);
    cursor: pointer;
    transition: transform 0.2s;
}

.btn-like:hover {
    transform: scale(1.1);
    background: #ffeef0;
}
        
input, textarea {
    background-color: var(--input-bg);
    color: var(--text);
    border: 1px solid #ccc;
}
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        #messages { border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 20px; background: #fafafa; border-radius: 8px; }
        .msg { background: white; padding: 10px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #eee; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <button onclick="document.body.classList.toggle('dark-mode')" 
        style="width: auto; padding: 10px; cursor: pointer; border-radius: 50px;">
    🌓 Toggle Night Mode
</button>
    <h2>Secret Message Board</h2>
    <div id="messages">Connecting to database...</div>

    <input type="text" id="username" placeholder="Your Name">
    <input type="text" id="content" placeholder="Type a message...">
    <button onclick="window.handleSend()">Post Message</button>

   <script>
    // 1. Setup
    const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
    const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
    let client;

    // 2. Color Generator (The "Secret Sauce")
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
        }
        return `hsl(${Math.abs(hash) % 360}, 65%, 45%)`;
    }

    // 3. Initialize
    async function init() {
        if (window.supabase) {
            client = window.supabase.createClient(SB_URL, SB_KEY);
            fetchData();
            setInterval(fetchData, 3000);
        } else {
            setTimeout(init, 500);
        }
    }

    // 4. Fetch & Render
    async function fetchData() {
        const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: true });
        if (error) return console.error(error);
        
        const container = document.getElementById('messages');
        
        container.innerHTML = data.map(m => {
            const userColor = stringToColor(m.username || "Anon");
            const time = m.created_at ? new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

            rreturn `
    <div class="msg" style="border-left: 5px solid ${userColor};">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong style="color: ${userColor};">${m.username}</strong>
            <small style="color: #999;">${time}</small>
        </div>
        
        <div style="margin-top: 5px;">${contentDisplay}</div>

        <div class="like-container">
            <button class="btn-like" onclick="window.addLike(${m.id}, ${m.likes || 0})">
                ❤️ ${m.likes || 0}
            </button>
        </div>
    </div>
`;
            `;
        }).join('');
        
        container.scrollTop = container.scrollHeight;
    }

    // 5. Global Functions for Buttons
    window.handleSend = async function() {
        const u = document.getElementById('username').value;
        const c = document.getElementById('content').value;
        if (!u || !c) return alert("Fill out both fields!");

        const { error } = await client.from('messages').insert([{ username: u, content: c, likes: 0 }]);
        if (error) alert(error.message);
        else {
            document.getElementById('content').value = '';
            fetchData();
        }
    };

    window.addLike = async function(id, currentLikes) {
        const { error } = await client.from('messages').update({ likes: (currentLikes || 0) + 1 }).eq('id', id);
        if (error) console.error(error);
        else fetchData();
    };

    init();
          // Check if they previously picked Dark Mode
if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
}

// Update the toggle button to save the preference
const originalToggle = document.body.classList.toggle;
document.body.classList.toggle = function(className) {
    const result = originalToggle.call(this, className);
    if (this.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark');
    } else {
        localStorage.setItem('theme', 'light');
    }
    return result;
};
</script>
</body>
</html>
