<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Message Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        /* 1. THEMES & VARIABLES */
        :root { 
            --bg: #ffffff; 
            --text: #1a1a1b; 
            --border: #e0e0e0;
            --msg-bg: rgba(255, 255, 255, 0.7);
        }
        body.dark-mode {
            --bg: #18191a;
            --text: #ffffff;
            --border: #3a3b3c;
            --msg-bg: rgba(36, 37, 38, 0.8);
        }

        /* 2. ANIMATED BACKGROUND */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 3. LAYOUT (HEADER, MAIN, FOOTER) */
        .header-area {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            z-index: 2000;
        }

        #messages {
            position: absolute;
            top: 70px; bottom: 75px;
            left: 0; right: 0;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .footer-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 15px;
            gap: 10px;
            z-index: 2000;
        }

        /* 4. MESSAGE BUBBLES */
        .message-row { display: flex; width: 100%; margin-bottom: 10px; }
        .message-row.me { justify-content: flex-end; }
        .message-row.them { justify-content: flex-start; }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            background: var(--msg-bg);
            backdrop-filter: blur(10px);
            color: var(--text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .chat-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
            display: block;
            cursor: zoom-in;
        }

        /* 5. INPUTS & BUTTONS */
        #username { width: 120px; padding: 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        #content { flex-grow: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
        
        .btn-send { background: linear-gradient(135deg, #6e8efb 0%, #a777e3 100%); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
        .btn-night { position: fixed; top: 15px; right: 15px; z-index: 3000; padding: 8px 15px; border-radius: 20px; cursor: pointer; background: rgba(255,255,255,0.3); backdrop-filter: blur(5px); border: 1px solid var(--border); color: var(--text); }

/* --- THIS APPLIES TO BOTH PC AND MOBILE --- */
#main-title {
    font-size: 1.1rem;
    margin: 0;
    white-space: nowrap;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    
    /* THE MAGIC LINE: This makes it react to the theme toggle */
    color: var(--text) !important; 
    transition: color 0.3s ease;
}

/* Ensure the header background also follows the theme on PC */
.header-area {
    background: var(--bg) !important;
    border-bottom: 1px solid var(--border);
    transition: background 0.3s ease;
}

        /* 6. MOBILE FIXES */
        @media (max-width: 600px) {
            .header-area { flex-direction: column; align-items: flex-start; height: 95px; justify-content: center; gap: 5px; }
            #messages { top: 95px; }

            
    </style>
</head>
<body>

    <button class="btn-night" onclick="toggleNightMode()">🌙 Night Mode</button>

    <header class="header-area">
        <h1 id="main-title">Secret Message Board</h1>
        <input type="text" id="username" placeholder="Your Name" oninput="saveName(this.value)">
    </header>

    <main id="messages"></main>

    <footer class="footer-area">
        <input type="text" id="content" placeholder="Type or paste image..." onkeypress="if(event.key === 'Enter') handleSend()">
        <button class="btn-send" onclick="handleSend()">Send ✈️</button>
    </footer>

    <script>
        const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
        const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
        const client = supabase.createClient(SB_URL, SB_KEY);

        // --- CORE LOGIC ---

        function saveName(val) { localStorage.setItem('savedName', val); }

        window.toggleNightMode = function() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        async function fetchData() {
            const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: true });
            if (error) return console.error(error);

            const currentUser = localStorage.getItem('savedName');
            const container = document.getElementById('messages');
            
            container.innerHTML = data.map(m => {
                const isMe = m.username === currentUser;
                const imgTag = m.image_data ? `<img src="${m.image_data}" class="chat-img" onclick="window.open(this.src)">` : "";
                
                return `
                    <div class="message-row ${isMe ? 'me' : 'them'}">
                        <div class="msg">
                            <strong style="font-size: 0.7rem; opacity: 0.8;">${m.username}</strong>
                            <div>${m.content || ''}</div>
                            ${imgTag}
                        </div>
                    </div>
                `;
            }).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        async function handleSend() {
            const u = document.getElementById('username').value;
            const c = document.getElementById('content').value;
            if (!u || !c) return;

            await client.from('messages').insert([{ username: u, content: c }]);
            document.getElementById('content').value = '';
            fetchData();
        }

        // --- IMAGE PASTE ---
        document.addEventListener('paste', async (e) => {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (const item of items) {
                if (item.type.includes("image")) {
                    const file = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        const u = document.getElementById('username').value || "Anon";
                        await client.from('messages').insert([{ username: u, image_data: event.target.result, content: "" }]);
                        fetchData();
                    };
                    reader.readAsDataURL(file);
                }
            }
        });

        // --- STARTUP ---
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
        document.getElementById('username').value = localStorage.getItem('savedName') || "";
        
        fetchData();
        setInterval(fetchData, 3000);
    </script>
</body>
</html>
