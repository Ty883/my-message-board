<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secret Board Pro</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3662/3662817.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3662/3662817.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #ffffff; --text: #1a1a1b; --border: #e0e0e0;
            --msg-bg: rgba(255, 255, 255, 0.75); --accent: #6e8efb;
            --time: rgba(0, 0, 0, 0.4);
        }
        body.dark-mode {
            --bg: #18191a; --text: #ffffff; --border: #2c2d2e;
            --msg-bg: rgba(45, 45, 48, 0.9); --time: rgba(255, 255, 255, 0.5);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .header-area {
            padding: calc(env(safe-area-inset-top) + 10px) 20px 15px;
            background: var(--bg); border-bottom: 1px solid var(--border); z-index: 100;
            text-align: left; position: relative;
        }

        .night-toggle { position: absolute; top: calc(env(safe-area-inset-top) + 15px); right: 20px; background: none; border: none; font-size: 22px; cursor: pointer; }

        #messages {
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch;
            padding-bottom: 150px;
        }

        .load-more {
            align-self: center; background: rgba(0,0,0,0.15); border: none; 
            padding: 8px 18px; border-radius: 20px; font-size: 11px; font-weight: 600;
            color: var(--text); cursor: pointer; margin-bottom: 15px; display: block;
        }

        .footer-area {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg); border-top: 1px solid var(--border);
            padding: 12px 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: flex; gap: 8px; align-items: center; z-index: 200;
        }

        .message-row { display: flex; width: 100%; }
        .message-row.me { justify-content: flex-end; }
        
        .msg {
            max-width: 85%; padding: 12px 16px; border-radius: 18px;
            background: var(--msg-bg); backdrop-filter: blur(10px);
            color: var(--text); box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }

        .msg-header { display: flex; justify-content: space-between; align-items: baseline; gap: 15px; margin-bottom: 4px; }
        .timestamp { font-size: 0.65rem; color: var(--time); font-weight: 400; }

        .reactions { margin-top: 10px; display: flex; gap: 6px; }
        .reaction-btn { 
            background: rgba(0,0,0,0.06); border: none; border-radius: 12px; 
            padding: 5px 10px; font-size: 14px; cursor: pointer; color: var(--text);
        }
        .me .reaction-btn { background: rgba(255,255,255,0.2); color: white; }

        .chat-img { max-width: 100%; border-radius: 12px; margin-top: 8px; display: block; }

        #username { width: 100px; padding: 6px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; margin-top: 8px; }
        #content { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; outline: none; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

    <header class="header-area">
        <button class="night-toggle" onclick="toggleTheme()">🌙</button>
        <h1 style="font-size: 1.2rem; margin: 0; color: var(--text); font-weight: 600;">Secret Message Board</h1>
        <input type="text" id="username" placeholder="Your Name" oninput="localStorage.setItem('savedName', this.value)">
    </header>

    <main id="messages">
        <button class="load-more" id="loadBtn" onclick="loadMore()">↑ Load Previous Messages</button>
    </main>

    <footer class="footer-area">
        <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="handleFileUpload(this)">
        <button onclick="document.getElementById('file-input').click()" style="background:none; border:none; font-size:22px;">➕</button>
        <input type="text" id="content" placeholder="Message..." onkeypress="if(event.key === 'Enter') handleSend()">
        <button class="btn-send" onclick="handleSend()">Send</button>
    </footer>

    <script>
        const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
        const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
        const client = supabase.createClient(SB_URL, SB_KEY);

        const container = document.getElementById('messages');
        let lastFingerprint = "";
        let limitCount = 10; 
        const EMOJIS = ['❤️', '😂', '🔥'];

        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('nightMode', isDark ? 'on' : 'off');
        }

        function loadMore() {
            limitCount += 10;
            fetchData(true);
        }

        function getUsernameColor(name) {
            let hash = 0;
            const str = name || "Anon";
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 75%, 50%)`;
        }

        function formatTime(isoStr) {
            const date = new Date(isoStr);
            return date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        }

        async function fetchData(forceScroll = false) {
            const { data, error } = await client.from('messages').select('*').order('created_at', { ascending: false }).limit(limitCount);
            if (error || !data) return;

            const currentFp = JSON.stringify(data.map(m => m.id + JSON.stringify(m.reactions || {})));
            if (currentFp === lastFingerprint && !forceScroll) return;
            
            const isAtBottom = (container.scrollHeight - container.scrollTop <= container.clientHeight + 150);
            lastFingerprint = currentFp;
            
            const currentUser = localStorage.getItem('savedName') || "";
            const loadBtn = document.getElementById('loadBtn');
            
            container.innerHTML = '';
            container.appendChild(loadBtn);

            data.reverse().forEach(m => {
                const isMe = m.username === currentUser;
                const color = getUsernameColor(m.username);
                const reacts = m.reactions || {};
                const img = m.image_data ? `<img src="${m.image_data}" class="chat-img">` : "";
                const time = formatTime(m.created_at);
                
                const rHtml = EMOJIS.map(e => `
                    <button class="reaction-btn" onclick="addReaction('${m.id}', '${e}')">
                        ${e} ${reacts[e] || 0}
                    </button>
                `).join('');

                const div = document.createElement('div');
                div.className = `message-row ${isMe ? 'me' : ''}`;
                div.innerHTML = `
                    <div class="msg" style="border-left: 5px solid ${isMe ? 'transparent' : color}">
                        <div class="msg-header">
                            <strong style="font-size: 0.75rem; color: ${color}; opacity: 0.9;">${m.username || 'Anon'}</strong>
                            <span class="timestamp">${time}</span>
                        </div>
                        <div style="word-break: break-word; margin: 4px 0;">${m.content || ''}</div>
                        ${img}
                        <div class="reactions">${rHtml}</div>
                    </div>
                `;
                container.appendChild(div);
            });

            if (forceScroll || isAtBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        async function handleSend() {
            const u = document.getElementById('username').value || "Anon";
            const c = document.getElementById('content').value;
            if (!c.trim()) return;
            document.getElementById('content').value = '';
            await client.from('messages').insert([{ username: u, content: c, reactions: { '❤️': 0, '😂': 0, '🔥': 0 } }]);
            fetchData(true);
        }

        async function handleFileUpload(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_W = 350; 
                    const scale = MAX_W / img.width;
                    canvas.width = MAX_W;
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const compressed = canvas.toDataURL('image/jpeg', 0.6); 
                    const u = document.getElementById('username').value || "Anon";
                    await client.from('messages').insert([{ username: u, image_data: compressed, content: "", reactions: { '❤️': 0, '😂': 0, '🔥': 0 } }]);
                    fetchData(true);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }

        async function addReaction(msgId, emoji) {
            const { data, error } = await client.from('messages').select('reactions').eq('id', msgId).single();
            if (error) return;
            let r = data.reactions || { '❤️': 0, '😂': 0, '🔥': 0 };
            r[emoji] = (r[emoji] || 0) + 1;
            await client.from('messages').update({ reactions: r }).eq('id', msgId);
            fetchData();
        }

        // Initialize
        document.getElementById('username').value = localStorage.getItem('savedName') || "";
        if (localStorage.getItem('nightMode') === 'on') {
            document.body.classList.add('dark-mode');
        }
        
        fetchData(true);
        setInterval(() => fetchData(false), 4000);
    </script>
</body>
</html>
