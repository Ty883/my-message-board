<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Message Board</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    
    <style>
    :root { --bg: #ffffff; --text: #1a1a1b; --msg-bg: #f0f2f5; }
   body.dark-mode {
    --bg: #18191a;
    --text: #ffffff; /* This sets the base text to white */
    --msg-bg: #242526;
    --border: #3a3b3c;
}
        /* Target the text inside all messages when in Dark Mode */
body.dark-mode .msg {
    color: #ffffff !important;
}

/* Ensure the username (strong tag) is also bright enough */
body.dark-mode .msg strong {
    filter: brightness(1.5); /* Makes the name colors pop more on dark bg */
}

/* Make sure the 'Them' messages don't stay dark gray */
body.dark-mode .message-row.them .msg {
    background-color: #3a3b3c;
    color: #ffffff;
}

   body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    min-height: 100vh;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
    #messages { 
        height: 400px; 
        overflow-y: auto; 
        border: 1px solid #ccc; 
        padding: 20px; 
        margin-bottom: 40px; 
    }

   .msg {
    background: rgba(255, 255, 255, 0.7); /* White with 70% transparency */
    backdrop-filter: blur(10px); /* The "Frosted" effect */
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    padding: 15px;
    border-radius: 16px; /* Extra rounded corners */
}

/* Dark mode version */
body.dark-mode .msg {
    background: rgba(36, 37, 38, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.1);
}
    }

        .pinned-msg {
    border-bottom: 1px dashed #ffd700;
    padding-bottom: 5px;
    margin-bottom: 15px !important;
}

.pinned-msg .msg {
    box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
}
.pinned-msg .msg {
    background: #fff9db !important; /* Light yellow for pinned posts */
    border: 2px solid #fab005 !important;
    box-shadow: 0 4px 10px rgba(250, 176, 5, 0.2);
}
        /* This adds a subtle glow to the pinned messages */
.pinned-msg .msg {
    position: relative;
    background: linear-gradient(135.2deg, rgba(255, 255, 255, 1) 0.8%, rgba(255, 248, 220, 1) 98.2%);
    border: 1px solid #ffd700 !important;
    animation: pinPulse 2s infinite;
}

/* A very gentle pulse to draw the eye */
@keyframes pinPulse {
    0% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
    50% { box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
    100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
}

/* This makes pinned messages "stick" to the top of the message window */
.pinned-msg {
    position: sticky;
    top: 0;
    z-index: 10; /* Keeps it above other scrolling messages */
    margin-bottom: 20px;
}

/* Optional: Add a "Pinned" label that stays visible */
.pinned-msg .msg::before {
    content: "📌 ANNOUNCEMENT";
    display: block;
    font-size: 0.6rem;
    font-weight: bold;
    color: #b8860b;
    margin-bottom: 5px;
}
        
/* Dark mode version of the pin glow */
body.dark-mode .pinned-msg .msg {
    background: linear-gradient(135.2deg, #1e1e1e 0.8%, #2d2a1e 98.2%);
    border: 1px solid #d4af37 !important;
}

body.dark-mode .pinned-msg .msg {
    background: #2d2a1e !important;
    border: 1px solid #fab005 !important;
}
        
    .like-container { 
        display: flex; 
        justify-content: flex-end; 
        margin-top: 5px; 
    }

    .btn-like { 
        width: auto !important; 
        padding: 2px 8px; 
        font-size: 0.8rem; 
        cursor: pointer; 
        border-radius: 15px; 
        border: 1px solid #ddd;
    }

        .btn-like {
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.btn-like:hover {
    transform: scale(1.2) rotate(5deg);
}

/* --- FABULOUS BUTTON BASE --- */
button {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    border: none;
    border-radius: 25px; /* The 'Pill' shape */
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
}

button:active {
    transform: translateY(-1px);
}

/* --- NIGHT MODE TOGGLE (Glass Style) --- */
.btn-night {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #333;
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
}

body.dark-mode .btn-night {
    background: rgba(0, 0, 0, 0.3);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* --- SEND BUTTON (Gradient Style) --- */
.btn-send {
    background: linear-gradient(135deg, #6e8efb 0%, #a777e3 100%);
    color: white;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 1px;
}

.btn-send:hover {
    filter: brightness(1.1);
    box-shadow: 0 5px 15px rgba(110, 142, 251, 0.4);
}
        
.input-area {
    position: fixed;
    bottom: 0;
    background: var(--bg);
    padding: 20px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
}

input[type="text"] {
    flex-grow: 1;
    border-radius: 25px;
    padding: 12px 20px;
    border: 1px solid #ddd;
    outline: none;
}

input[type="text"]:focus {
    border-color: #007bff;
    box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
}
        
    input { padding: 8px; margin-right: 5px; }

@media (max-width: 600px) {
    .input-area {
        flex-direction: column; /* This stacks them vertically! */
        padding: 10px;
        gap: 8px;
    }

    #username {
        display: block !important; /* This brings it back! */
        width: 100%; /* Makes it full width on the phone */
    }

    .btn-send {
        width: 100%; /* Makes the send button nice and big for thumbs */
        padding: 12px;
    }
}
    /* 1. Make the message board take up more space */
    #messages {
        width: 100%;
        padding: 10px;
        margin-top: 70px; /* Space for the floating toggle */
    }

    /* 5. Adjust the message bubbles to be wider on small screens */
    .msg {
        max-width: 85%;
        font-size: 0.95rem;
    }
}

        /* --- TOP HEADER --- */
.header-area {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    z-index: 1000;
}

.header-area h1 {
    font-size: 1.2rem;
    margin: 5px 0;
}

#username {
    width: 60%;
    max-width: 200px;
    padding: 8px;
    border-radius: 15px;
    text-align: center;
}

/* --- BOTTOM FOOTER --- */
.footer-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg);
    padding: 15px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
    z-index: 1000;
}

#content {
    flex-grow: 1;
    border-radius: 20px;
    padding: 12px;
    font-size: 16px; /* Essential for mobile zoom fix */
}

/* --- MESSAGE AREA SPACING --- */
#messages {
    margin-top: 110px; /* Space for Header */
    margin-bottom: 80px; /* Space for Footer */
    padding: 10px;
    overflow-y: auto;
}

/* --- MOBILE SPECIFIC FIXES --- */
@media (max-width: 600px) {
    .header-area h1 { font-size: 1rem; }
    
    .footer-area {
        padding: 10px;
        padding-bottom: 25px; /* Extra room for phone 'home' bars */
    }
}

        
    </style>
    
</head>

<body>
    <div class="header-area">
        <h1>Secret Message Board</h1>
        <input type="text" id="username" placeholder="Your Name" oninput="window.saveName(this.value)">
    </div>

    <div id="messages"></div>

    <div class="footer-area">
        <input type="text" id="content" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') window.handleSend()">
        <button class="btn-send" onclick="window.handleSend()">Send ✈️</button>
    </div>

    <button class="btn-night" onclick="window.toggleNightMode()">🌙</button>

    
    <button onclick="window.toggleNightMode()" style="width: auto;">
    🌙 Toggle Night Mode
</button>
    
    
<script>
    const SB_URL = 'https://iatkqxybgldhxzgqrbxq.supabase.co'; 
    const SB_KEY = 'sb_publishable_29_UPCY6LIOTBTn_UwNrsA_a4uVSxeq';
    let client;

    // --- 1. HELPERS ---
    function stringToColor(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) { hash = str.charCodeAt(i) + ((hash << 5) - hash); }
        return `hsl(${Math.abs(hash) % 360}, 70%, 45%)`;
    }

    window.toggleNightMode = function() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };

    window.saveName = function(name) {
        localStorage.setItem('savedName', name);
        fetchData();
    };

    // --- 2. THE SEND LOGIC (Fixed) ---
    window.handleSend = async function() {
        const u = document.getElementById('username').value;
        const c = document.getElementById('content').value;
        if (!u || !c) return alert("Fill in your name and message!");

        // We explicitly set is_pinned to false for new messages
        const { error } = await client.from('messages').insert([
            { username: u, content: c, likes: 0, is_pinned: false }
        ]);

        if (error) {
            console.error("Send Error:", error);
            alert("Could not send: " + error.message);
        } else {
            document.getElementById('content').value = '';
            fetchData();
        }
    };

    window.addLike = async function(id, currentLikes) {
        await client.from('messages').update({ likes: (currentLikes || 0) + 1 }).eq('id', id);
        fetchData();
    };

    // --- 3. THE RENDER LOGIC (With Pinning) ---
    async function fetchData() {
        if (!client) return;
        
        // Correctly ordering: Pins first, then newest at bottom
        const { data, error } = await client
            .from('messages')
            .select('*')
            .order('is_pinned', { ascending: false }) 
            .order('created_at', { ascending: true });

        if (error) return console.error("Fetch Error:", error);

        const currentUser = document.getElementById('username').value;
        const container = document.getElementById('messages');
        
        container.innerHTML = data.map(m => {
            const isMe = m.username === currentUser && currentUser !== "";
            const isPinned = m.is_pinned === true;
            const userColor = stringToColor(m.username || "Anon");
            
            const isImg = m.content.match(/\.(jpeg|jpg|gif|png)$/) != null && m.content.startsWith('http');
            const display = isImg ? `<img src="${m.content}" style="max-width:100%; border-radius:5px;"/>` : m.content;
            
            return `
                <div class="message-row ${isMe ? 'me' : 'them'} ${isPinned ? 'pinned-msg' : ''}">
                    <div class="msg" style="${isMe ? 'border-right' : 'border-left'}: 5px solid ${userColor}">
                        ${isPinned ? '<div style="font-size:0.6rem; color:#d4af37; font-weight:bold;">📌 PINNED</div>' : ''}
                        <div style="font-size:0.75rem; margin-bottom:4px;">
                            <strong style="color:${isMe ? 'white' : userColor}">${m.username}</strong>
                        </div>
                        <div>${display}</div>
                        <div class="like-container">
                            <button class="btn-like" onclick="window.addLike(${m.id}, ${m.likes || 0})">❤️ ${m.likes || 0}</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        // Only scroll to bottom if we aren't looking at pins? 
        // For now, let's keep it scrolling so you see your new sent message.
        container.scrollTop = container.scrollHeight;
    }

    // --- 4. STARTUP ---
    async function init() {
       
        window.toggleNightMode = function() {
    const isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    
    // Update the button text/icon based on the mode
    const btn = document.querySelector('.btn-night');
    if (btn) {
        btn.innerHTML = isDark ? '☀️ Light Mode' : '🌙 Night Mode';
    }
};

    } else {

    }

    // ... (rest of your existing init code for Name and Supabase)
}

        const saved = localStorage.getItem('savedName');
        if (saved) document.getElementById('username').value = saved;

        if (window.supabase) {

</script>
</body>
</html>
